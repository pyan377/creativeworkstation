spring.application.name=creativeworkstation

# ==========================================
# 生产环境配置 (Railway 部署)
# 通过环境变量配置数据库
# ==========================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=${DB_DRIVER}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# JPA & Hibernate 配置
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_DIALECT}
spring.jpa.show-sql=false

# ==========================================
# 文件上传配置
# ==========================================
upload.dir=${UPLOAD_DIR:/app/uploads}
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==========================================
# Cloudflare R2 对象存储 (Railway 环境变量)
# ==========================================
cloudflare.r2.endpoint=${R2_ENDPOINT}
cloudflare.r2.access-key=${R2_ACCESS_KEY}
cloudflare.r2.secret-key=${R2_SECRET_KEY}
cloudflare.r2.bucket-name=${R2_BUCKET_NAME}
cloudflare.r2.public-domain=${R2_PUBLIC_DOMAIN}
