spring.application.name=creativeworkstation

# ==========================================
# 1. 数据库配置 (H2 内存数据库，用于测试)
# ==========================================
spring.datasource.url=jdbc:h2:mem:portfolio_studio;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# 2. JPA & Hibernate 配置
# ==========================================
# update 模式会自动根据 Java 实体类创建/更新数据库表结构
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 3. 文件上传存储路径（根据需要修改）
# ==========================================
# Windows 建议：D:/PortfolioData（请确保文件夹存在）
# Mac/Linux 建议：/Users/你的用户名/PortfolioData
upload.dir=D:/PortfolioData

# 文件上传大小限制
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
