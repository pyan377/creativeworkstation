spring.application.name=creativeworkstation

# ==========================================
# 本地开发环境配置 (H2 内存数据库)
# ==========================================
spring.datasource.url=jdbc:h2:mem:portfolio_studio;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA & Hibernate 配置
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 文件上传配置
# ==========================================
upload.dir=D:/PortfolioData
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==========================================
# Cloudflare R2 对象存储
# 请在本地环境变量或下方填入你的 R2 凭证
# ==========================================
cloudflare.r2.endpoint=${R2_ENDPOINT:https://<ACCOUNT_ID>.r2.cloudflarestorage.com}
cloudflare.r2.access-key=${R2_ACCESS_KEY:your-access-key}
cloudflare.r2.secret-key=${R2_SECRET_KEY:your-secret-key}
cloudflare.r2.bucket-name=${R2_BUCKET_NAME:your-bucket-name}
cloudflare.r2.public-domain=${R2_PUBLIC_DOMAIN:https://pub-xxxx.r2.dev}
